<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #0f172a; }
    .pulse {
      fill: none;
      stroke: #22c55e;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: draw 2s ease-in-out infinite;
    }
    .glow {
      fill: none;
      stroke: #22c55e;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.3;
      filter: blur(1px);
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: draw 2s ease-in-out infinite;
    }
    @keyframes draw {
      0% { stroke-dashoffset: 60; }
      50% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -60; }
    }
  </style>
  <rect class="bg" width="32" height="32" rx="4"/>
  <path class="glow" d="M4 16 L10 16 L12 10 L16 22 L20 6 L22 16 L28 16"/>
  <path class="pulse" d="M4 16 L10 16 L12 10 L16 22 L20 6 L22 16 L28 16"/>
</svg>
